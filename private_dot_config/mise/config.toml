[tools]
cargo-binstall = "1.19.1"
go             = "1.26.3"
node           = "24.16.0"
rust           = "1.93.1"
terraform      = "1.6.6"
usage          = "3.3.0"

"npm:@anthropic-ai/claude-code" = "2.1.158"
"npm:@google/gemini-cli"        = "0.42.0"
"npm:@openai/codex"             = "0.132.0"
"npm:markdownlint-cli2"         = "0.22.1"

"pipx:ansible-core" = { version = "2.20.6", uvx_args = "--with jmespath==1.0.1 --with kubernetes==33.1.0" }
"pipx:pre-commit"   = "4.6.0"
"pipx:yamllint"     = "1.38.0"

[settings]
experimental                        = true
trusted_config_paths                = ["~/code"]
idiomatic_version_file_enable_tools = []

[settings.npm]
bun = true
[settings.pipx]
uvx = true

[[env]]
_.file = ".env"
# This should be loaded to env as needed
# [[env]]
# _.file = { path = "~/.env.secrets", redact = true }
[[env]]
_.file = "~/.env.overrides"

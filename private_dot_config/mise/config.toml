[tools]
bun            = "1.3.14"
cargo-binstall = "1.20.1"
go             = "1.26.5"
node           = "24.18.0"
rust           = "1.95.0"
terraform      = "1.6.6"
usage          = "3.5.6"
uv             = "0.11.30"

"npm:@anthropic-ai/claude-code" = "2.1.215"
"npm:@upstash/context7-mcp"     = "3.2.4"
"npm:ccstatusline"              = "2.2.25"
"npm:markdownlint-cli2"         = "0.23.1"

"pipx:ansible-core" = { version = "2.21.2", uvx_args = "--with jmespath==1.0.1 --with kubernetes==33.1.0" }
"pipx:pre-commit"   = "4.6.0"
"pipx:yamllint"     = "1.38.0"

[settings]
experimental                        = true
trusted_config_paths                = ["~/code"]
idiomatic_version_file_enable_tools = []

[settings.npm]
bun = true
[settings.pipx]
uvx = true

[[env]]
_.file = ".env"
# This should be loaded to env as needed
# [[env]]
# _.file = { path = "~/.env.secrets", redact = true }
[[env]]
_.file = "~/.env.overrides"
